<!DOCTYPE html>
<html>
<head>
  <title>Оставить отзыв</title>
</head>
<body>

<h2>Оставить отзыв</h2>

<input id="name" placeholder="Ваше имя"><br><br>

<select id="rating">
  <option value="5">5 ⭐</option>
  <option value="4">4 ⭐</option>
  <option value="3">3 ⭐</option>
</select><br><br>

<textarea id="text" placeholder="Ваш отзыв"></textarea><br><br>

<button onclick="sendReview()">Отправить</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, addDoc, collection, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDgZGZa5IDmaQmh4m2zNBHwTMIJKowCz9Y",
  authDomain: "base-tipair.firebaseapp.com",
  projectId: "base-tipair",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Получаем токен из ссылки
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

async function sendReview() {
  if (!token) {
    alert("Ссылка недействительна");
    return;
  }

  const name = document.getElementById("name").value;
  const text = document.getElementById("text").value;
  const rating = document.getElementById("rating").value;

  const tokenRef = doc(db, "tokens", token);
  const tokenSnap = await getDoc(tokenRef);

      if (!tokenSnap.exists()) {
        alert("Ссылка не найдена");
        return;
      }
      
      if (tokenSnap.data().used) {
        alert("Ссылка уже использована");
        return;
      }
      
      // сохраняем отзыв
      await addDoc(collection(db, "reviews"), {
        name,
        text,
        rating,
        token,
        status: "pending",
        createdAt: Date.now()
      });
      
      // помечаем токен как использованный
      await setDoc(tokenRef, { used: true });
      
      alert("Отзыв отправлен!");
}
</script>

</body>
</html>
